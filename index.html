<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MetLife Optical Eligibility Tool</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Flatpickr -->
    
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>

        <img src="unnamed.png"
             alt="MetLife Logo"
             class="logo">

        <h1 id="title">
            <span class="glasses-icon">👓</span>
           MetLife OptiChick
        </h1>
        
        <div id="agentInfo"
           class="agent-info hidden">
         </div>


        

            <!-- Live Date Time -->
     <div class="controls">

      <div id="dateTime"
         class="datetime-box">
     </div>

     <button id="langToggle"
            class="icon-btn"
            title="Language">
        <i class="fa-solid fa-globe"></i>
     </button>

      <button id="modeToggle"
            class="icon-btn"
            title="Dark Mode">
        <i class="fa-solid fa-moon"></i>
        </button>

       </div>
        
    </header>
    

    <!-- MAIN -->
    <main>

        <section class="input-section">

            <!-- Policy Start -->

            <label id="policyLabel">
                Policy Start Date

                <input
                    type="text"
                    id="policyStart"
                    placeholder="DD/MM/YYYY">
            </label>

            <!-- Cycle -->

            <label id="cycleLabel">
                Cycle Rule (Years)

                <select id="cycleRule">

                    <option value="">
                        Select Cycle
                    </option>

                    <option value="1">
                        1 Year
                    </option>

                    <option value="2">
                        2 Years
                    </option>

                </select>

            </label>

            <!-- Last Glasses -->

            <label id="lastLabel">
                Last Glasses Date

                <input
                    type="text"
                    id="lastGlasses"
                    placeholder="DD/MM/YYYY">
            </label>

            <!-- Buttons -->

            <div class="buttons">

                <button id="checkBtn">
                    ✔️ CHECK
                </button>

                <button id="resetBtn">
                    🔄 RESET
                </button>
               <!--  <button id="exportPdfBtn">
                    📄 Export Report
                 </button>  -->

            </div>

        </section>

        <!-- OUTPUT -->

        <section id="output"
                 class="output-section">
        </section>

        <!--<section id="auditSection"
         class="output-section hidden">
          <h3>Calculation Details</h3>

          <div id="auditContent"></div>
         </section> -->

        <!-- SPINNER -->

        <div id="spinner"
             class="loader hidden">
        </div>
      

    
    
    <div class="case-id-box">
      <strong>Case ID:</strong>
      <span id="caseId">-</span>
    </div>
    
   </main>
    <!-- FOOTER -->

    <footer>

        <p>
          © <span id="currentYear"></span> MetLife Egypt
        </p>

        <p>
            MetLife OptiChick Tool
        </p>

        <p>
            Developed by Samy Deif
        </p>

    </footer>

    <!-- Flatpickr -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    

    <!-- Agent Login Popup -->

<div id="agentModal" class="modal-overlay">

  <div class="modal-box">

    <img src="metlife_logo.jpg" class="modal-logo">
    <p class="tool-version">
       Version 1.0 | Internal Use Only
       </p>

    <h2>Agent Information</h2>

    <label>
      Agent Name
      <input
       type="text"
       id="agentName"
       maxlength="50"
       autocomplete="off"
       placeholder="Enter your name">
    </label>

    <label>
      Department

      <select id="agentDepartment">

        <option value="">
          Select Department
        </option>

        <option>
          Customer Service
        </option>

        <option>
          Claims
        </option>

    
        <option>
          Quality
        </option>

      </select>

    </label>

    <button id="saveAgentBtn">
      Continue
    </button>

  </div>

 </div>
 <script src="code.js"></script>

</body>


</html>
